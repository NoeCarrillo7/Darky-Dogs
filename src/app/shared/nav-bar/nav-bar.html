<div class="container">

    <div class="content-options left">
        <a routerLink="/inicio" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
            INICIO
        </a>
        <a routerLink="/menu" routerLinkActive="active">
            MENÚ
        </a>
    </div>

    <!-- LOGO -->
    <div class="content-logo"  (click)="toggleMenu()">
        @if(!menuOpen){
            <img src="assets/logos/LogoMenu.png" alt="logo">
        }
        @if(menuOpen){
            <span class="close-menu">✕</span>
        }
    </div>

    <div class="content-options right">
        <a routerLink="/eventos" routerLinkActive="active">
            EVENTOS
        </a>

        <a routerLink="/franquicias" routerLinkActive="active">
            FRANQUICIAS
        </a>
    </div>
    <div class="mobile-menu" [class.open]="menuOpen">
    <a routerLink="/inicio" (click)="menuOpen=false">INICIO</a>
    <a routerLink="/menu" (click)="menuOpen=false">MENÚ</a>
    <a routerLink="/eventos" (click)="menuOpen=false">EVENTOS</a>
    <a routerLink="/franquicias" (click)="menuOpen=false">FRANQUICIAS</a>
</div>

</div>
